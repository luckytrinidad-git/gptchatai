version: "3.9"

services:
  api:
    build: ./gptchatbot-api
    container_name: birgptchatbot-api
    ports:
      - "8000:8000"
    volumes:
      - ./gptchatbot-api:/app
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=gptchatbot.settings
    restart: always

  ui:
    build: ./gptchatbot-ui
    container_name: birgptchatbot-ui
    ports:
      - "8001:8001"
    volumes:
      - ./gptchatbot-ui:/app
      - ./gptchatbot-api:/gptchatbot-api 
    environment:
      - PYTHONPATH=/app:/gptchatbot-api  
      - DJANGO_SETTINGS_MODULE=gptchatbot.settings
    depends_on:
      - api
    restart: always