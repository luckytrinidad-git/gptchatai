version: "3.9"

services:

  api:
    build: ./gptchatbot-api
    container_name: birgptchatbot-api
    ports:
      - "8000:8000"
    volumes:
      - ./gptchatbot-api:/app
    environment:
      # This tells Python to look in /app for the 'gptchatbot' folder
      - PYTHONPATH=/app 
    restart: always

  ui:
    build: ./gptchatbot-ui
    container_name: birgptchatbot-ui
    ports:
      - "8001:8001"
    volumes:
      - ./gptchatbot-ui:/app
    environment:
      # Streamlit also needs to know where its utils are
      - PYTHONPATH=/app
    depends_on:
      - api
    restart: always